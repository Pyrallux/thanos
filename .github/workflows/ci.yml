name: CI

# CI pipeline for Thanos — runs on every push and pull request to main.
# Three jobs, all in parallel:
#   - build:  compiles the binary for linux/amd64 (the deployment target)
#   - test:   runs `go test` and uploads a coverage report
#   - security: runs govulncheck against the module graph
#
# CGO is enabled because the sentinel uses gopacket (libpcap) on Linux and
# the build scripts set CGO_ENABLED=1. We install libpcap-dev for the build
# and test jobs so CGO-dependent code compiles.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap (CGO dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags "-X thanos/internal/version.version=ci" -o bin/thanos ./cmd/thanos

      - name: Verify binary
        run: ./bin/thanos --version || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap (CGO dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          # `gofmt -l` lists files that aren't formatted; fail if any.
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        env:
          CGO_ENABLED: "1"
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  security:
    name: Security scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libpcap (CGO dependency)
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...